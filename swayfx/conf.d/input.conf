set $mod Mod4
set $left h
set $down j
set $up k
set $right l

set $term kitty

set $menu wofi --show drun

set $run wofi --show run

set $drun-rofi rofi -show drun

set $run-rofi rofi -show run

set $file nautilus

# im lwk used to the 2 fingers to right click gesture in gnome
input type:touchpad {
    tap enabled
    tap_button_map lrm
}

# layout switch
input type:keyboard {
    xkb_layout us,ru
}